<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilibili Audio Downloader</title>
    <style>
        :root {
            --primary: #fb7299;
            --primary-hover: #e05a80;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #333333;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 16px;
        }

        .container {
            width: 100%;
            max-width: 560px;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 28px;
            font-weight: 700;
        }

        /* ---- Input row ---- */
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #url-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #url-input:focus {
            border-color: var(--primary);
        }

        #url-input:disabled {
            background: #f0f0f0;
            color: #999;
        }

        #format-select {
            padding: 12px 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: inherit;
            background: #fff;
            color: var(--text);
            cursor: pointer;
            outline: none;
            min-width: 100px;
            transition: border-color 0.2s;
        }

        #format-select:focus {
            border-color: var(--primary);
        }

        #format-select:disabled {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
        }

        #fetch-btn,
        #reset-btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, opacity 0.2s;
        }

        #fetch-btn {
            background: var(--primary);
            color: #fff;
        }

        #fetch-btn:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        #fetch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #reset-btn {
            background: #eee;
            color: var(--text);
            display: none;
        }

        #reset-btn:hover {
            background: #ddd;
        }

        /* ---- Status area ---- */
        #status-msg {
            text-align: center;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            min-height: 24px;
        }

        #status-msg.error {
            color: #e74c3c;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ccc;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ---- Video card ---- */
        #video-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: none;
        }

        #video-card.visible {
            display: block;
        }

        .card-header {
            display: flex;
            gap: 16px;
            padding: 20px;
        }

        #cover-img {
            width: 120px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            background: #eee;
            flex-shrink: 0;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        #video-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
        }

        #video-duration {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* ---- Download section ---- */
        .card-footer {
            padding: 0 20px 20px;
        }

        #download-link {
            display: none;
            width: 100%;
            padding: 14px 0;
            background: var(--primary);
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #download-link.visible {
            display: block;
        }

        #download-link:hover {
            background: var(--primary-hover);
        }

        #download-btn-disabled {
            display: none;
            width: 100%;
            padding: 14px 0;
            background: #ccc;
            color: #fff;
            text-align: center;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
        }

        #download-btn-disabled.visible {
            display: block;
        }

        /* Progress bar */
        #progress-wrap {
            display: none;
            margin-top: 12px;
        }

        #progress-wrap.visible {
            display: block;
        }

        #progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        #progress-text {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* ---- History list ---- */
        #history-section {
            margin-top: 24px;
        }

        #history-section h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        #history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #history-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        #history-list li:hover {
            border-color: var(--primary);
            background: #fff5f7;
        }

        .history-url {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .history-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .history-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #eee;
            color: var(--text-secondary);
            white-space: nowrap;
            text-transform: uppercase;
        }

        .history-time {
            font-size: 0.7rem;
            color: #aaa;
            white-space: nowrap;
        }

        #history-clear {
            font-size: 0.75rem;
            color: #ccc;
            cursor: pointer;
            border: none;
            background: none;
            margin-left: 8px;
        }

        #history-clear:hover {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Bilibili Audio Downloader</h1>

        <div class="input-row">
            <input type="text" id="url-input"
                   placeholder="Put Bilibili video URL... e.g. https://www.bilibili.com/video/BV1xx411c7mD">
            <select id="format-select">
                <option value="mp3" selected>MP3</option>
                <option value="m4a">M4A (AAC)</option>
                <option value="opus">Opus</option>
                <option value="flac">FLAC</option>
                <option value="wav">WAV</option>
                <option value="aac">AAC</option>
            </select>
            <button id="fetch-btn">Submit</button>
            <button id="reset-btn">Reset</button>
        </div>

        <div id="status-msg"></div>

        <div id="history-section" style="display:none">
            <h3>Recent <button id="history-clear">clear</button></h3>
            <ul id="history-list"></ul>
        </div>

        <div id="video-card">
            <div class="card-header">
                <img id="cover-img" src="" alt="Cover">
                <div class="card-info">
                    <div id="video-title"></div>
                    <div id="video-duration"></div>
                </div>
            </div>
            <div class="card-footer">
                <a id="download-link" href="#" download>⬇ Download Audio</a>
                <button id="download-btn-disabled">Preparing...</button>
                <div id="progress-wrap">
                    <div id="progress-bar">
                        <div id="progress-fill"></div>
                    </div>
                    <div id="progress-text"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM refs
        const urlInput = document.getElementById('url-input');
        const fetchBtn = document.getElementById('fetch-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusMsg = document.getElementById('status-msg');
        const videoCard = document.getElementById('video-card');
        const coverImg = document.getElementById('cover-img');
        const videoTitle = document.getElementById('video-title');
        const videoDuration = document.getElementById('video-duration');
        const formatSelect = document.getElementById('format-select');
        const downloadLink = document.getElementById('download-link');
        const downloadBtnDisabled = document.getElementById('download-btn-disabled');
        const progressWrap = document.getElementById('progress-wrap');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');

        let pollTimer = null;
        let currentTaskId = null;
        let currentUrl = null;
        let currentFormat = 'mp3';
        let currentTitle = null;

        // ---- History (localStorage) ----
        const HISTORY_KEY = 'downloadtool_history';
        const HISTORY_MAX_AGE_MS = 7 * 24 * 3600 * 1000;  // 7 days
        const historySection = document.getElementById('history-section');
        const historyList = document.getElementById('history-list');
        const historyClear = document.getElementById('history-clear');

        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveHistory(items) {
            try {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
            } catch (e) {
                // localStorage full or unavailable — silently ignore
            }
        }

        function cleanHistory(items) {
            const cutoff = Date.now() - HISTORY_MAX_AGE_MS;
            return items.filter(e => e.ts > cutoff);
        }

        function addToHistory(url, format, title) {
            let items = cleanHistory(loadHistory());
            // Remove duplicate URL (same normalized URL → keep only the newest)
            items = items.filter(e => e.url !== url);
            items.unshift({
                url: url,
                format: format,
                title: title || '',
                ts: Date.now()
            });
            // Keep at most 30 entries
            if (items.length > 30) items = items.slice(0, 30);
            saveHistory(items);
            renderHistory(items);
        }

        function renderHistory(items) {
            items = items || cleanHistory(loadHistory());
            if (!items.length) {
                historySection.style.display = 'none';
                return;
            }
            historySection.style.display = 'block';
            historyList.innerHTML = items.map(e => {
                const timeStr = formatTimeAgo(e.ts);
                const displayTitle = e.title ? e.title : e.url;
                return '<li onclick="fillFromHistory(\'' + escapeHtml(e.url) + '\', \'' + escapeHtml(e.format) + '\')">'
                    + '<span class="history-url" title="' + escapeHtml(e.url) + '">' + escapeHtml(displayTitle) + '</span>'
                    + '<span class="history-badge">' + escapeHtml(e.format) + '</span>'
                    + '<span class="history-time">' + timeStr + '</span>'
                    + '</li>';
            }).join('');
        }

        function fillFromHistory(url, format) {
            urlInput.value = url;
            if (format && formatSelect) {
                formatSelect.value = format;
            }
        }

        function formatTimeAgo(ts) {
            const diff = Date.now() - ts;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hours = Math.floor(mins / 60);
            if (hours < 24) return hours + 'h ago';
            const days = Math.floor(hours / 24);
            return days + 'd ago';
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Render history on page load
        renderHistory();

        // Clear button
        historyClear.addEventListener('click', function(e) {
            e.stopPropagation();
            localStorage.removeItem(HISTORY_KEY);
            historySection.style.display = 'none';
            historyList.innerHTML = '';
        });

        // ---- Helpers ----
        function setUIState(state, msg) {
            statusMsg.className = '';
            statusMsg.innerHTML = '';
            videoCard.classList.remove('visible');
            downloadLink.classList.remove('visible');
            downloadBtnDisabled.classList.remove('visible');
            progressWrap.classList.remove('visible');
            fetchBtn.disabled = false;
            resetBtn.style.display = 'none';

            switch (state) {
                case 'loading':
                    statusMsg.innerHTML = '<span class="spinner"></span> ' + (msg || 'Processing...');
                    fetchBtn.disabled = true;
                    urlInput.disabled = true;
                    formatSelect.disabled = true;
                    break;
                case 'error':
                    statusMsg.textContent = msg || 'Something went wrong';
                    statusMsg.classList.add('error');
                    resetBtn.style.display = 'inline-block';
                    urlInput.disabled = true;
                    fetchBtn.disabled = true;
                    formatSelect.disabled = true;
                    break;
                case 'info':
                    videoCard.classList.add('visible');
                    urlInput.disabled = true;
                    fetchBtn.disabled = true;
                    formatSelect.disabled = true;
                    break;
                case 'downloading':
                    videoCard.classList.add('visible');
                    progressWrap.classList.add('visible');
                    downloadBtnDisabled.classList.add('visible');
                    downloadBtnDisabled.textContent = 'Downloading...';
                    urlInput.disabled = true;
                    fetchBtn.disabled = true;
                    formatSelect.disabled = true;
                    break;
                case 'ready':
                    videoCard.classList.add('visible');
                    downloadLink.classList.add('visible');
                    progressWrap.classList.add('visible');
                    progressFill.style.width = '100%';
                    urlInput.disabled = true;
                    fetchBtn.disabled = true;
                    formatSelect.disabled = true;
                    resetBtn.style.display = 'inline-block';
                    break;
                default:
                    // idle
                    urlInput.disabled = false;
                    formatSelect.disabled = false;
                    break;
            }
        }

        function formatDuration(seconds) {
            if (!seconds && seconds !== 0) return '';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + String(s).padStart(2, '0');
        }

        function formatSize(mb) {
            if (!mb && mb !== 0) return '';
            return mb.toFixed(1) + ' MB';
        }

        // ---- Helpers ----
        function normalizeUrl(raw) {
            let url = raw.trim();
            if (!url) return url;
            // Auto-prepend https:// if no scheme is present
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }
            return url;
        }

        // ---- API calls ----
        async function submitUrl() {
            let url = normalizeUrl(urlInput.value);
            if (!url) return;

            // Update the input to show the normalized URL
            urlInput.value = url;

            setUIState('loading', 'Extracting video info...');

            try {
                const resp = await fetch('/api/prepare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format: formatSelect.value })
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Failed to process URL');
                }

                const data = await resp.json();
                currentTaskId = data.task_id;
                currentUrl = url;
                currentFormat = formatSelect.value;
                startPolling(currentTaskId);
            } catch (e) {
                setUIState('error', e.message);
            }
        }

        function startPolling(taskId) {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(() => pollTask(taskId), 800);
        }

        async function pollTask(taskId) {
            try {
                const resp = await fetch('/api/task/' + taskId);
                if (!resp.ok) throw new Error('Failed to get task status');
                const data = await resp.json();
                updateUI(data);
            } catch (e) {
                // Network errors during polling: silently retry
            }
        }

        function updateUI(data) {
            switch (data.status) {
                case 'preparing':
                    setUIState('loading', 'Getting video info...');
                    break;

                case 'downloading':
                    setUIState('downloading');
                    if (data.title) videoTitle.textContent = data.title;
                    if (data.cover) coverImg.src = data.cover;
                    if (data.duration) videoDuration.textContent = 'Duration: ' + formatDuration(data.duration);
                    if (data.progress != null && data.progress >= 0) {
                        progressFill.style.width = data.progress + '%';
                        progressText.textContent = data.progress + '%';
                        if (data.filesize_mb) {
                            progressText.textContent += ' of ' + formatSize(data.filesize_mb);
                        }
                    }
                    break;

                case 'ready':
                    setUIState('ready');
                    if (data.title) videoTitle.textContent = data.title;
                    if (data.cover) coverImg.src = data.cover;
                    if (data.duration) videoDuration.textContent = 'Duration: ' + formatDuration(data.duration);
                    downloadLink.href = data.download_url || '#';
                    downloadLink.download = data.filename || 'audio.m4a';
                    if (data.filesize_mb) {
                        downloadLink.textContent = '⬇ Download Audio (' + formatSize(data.filesize_mb) + ')';
                    }
                    // Save to history on successful download
                    if (currentUrl) {
                        addToHistory(currentUrl, currentFormat, data.title || '');
                    }
                    stopPolling();
                    break;

                case 'error':
                    setUIState('error', data.error || 'Download failed');
                    stopPolling();
                    break;
            }
        }

        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        function reset() {
            stopPolling();
            currentTaskId = null;
            currentUrl = null;
            currentFormat = 'mp3';
            currentTitle = null;
            urlInput.value = '';
            urlInput.disabled = false;
            fetchBtn.disabled = false;
            formatSelect.disabled = false;
            formatSelect.value = 'mp3';
            resetBtn.style.display = 'none';
            statusMsg.className = '';
            statusMsg.innerHTML = '';
            videoCard.classList.remove('visible');
            downloadLink.classList.remove('visible');
            downloadBtnDisabled.classList.remove('visible');
            progressWrap.classList.remove('visible');
            progressFill.style.width = '0%';
            progressText.textContent = '';
            coverImg.src = '';
        }

        // ---- Event listeners ----
        fetchBtn.addEventListener('click', submitUrl);
        urlInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') submitUrl();
        });
        resetBtn.addEventListener('click', reset);
    </script>
</body>
</html>
